{% extends '_base.html' %}


{% block title %}
    HomePage
{% endblock %}

{% block content %}
    <h1>HomePage</h1>
    {% if user.is_authenticated %}
        <p>Welcome {{ user.username }} | <a href="{% url 'account_logout' %}">Logout</a>
    {% else %}
        <a href="{% url 'account_login' %}">Login</a> | <a href="{% url 'account_signup' %}">Signup</a>
    {% endif %}
{% endblock %}
