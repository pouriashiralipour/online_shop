{% extends '_base.html' %}

{% block title %}
    HomePage
{% endblock %}

{% block content %}
    {% if user.is_authenticated %}
        <p>Welcome {{ user.username }} | <a href="{% url 'logout' %}">logout</a>
    {% else %}
       <a href="{% url 'login' %}">Login</a> | <a href="{% url 'signup' %}">Signup</a>
    {% endif %}
{% endblock %}
